name: VaultGuard CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  # Job 1: Scan for leaked secrets
  secret-scan:
    name: Scan for secrets (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Build Docker image (only if scan passes)
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t vaultguard-app ./app
          echo "Docker build successful"

      - name: Run smoke test
        run: |
          docker run -d -p 5000:5000 --name vaultguard-test vaultguard-app
          sleep 5
          curl --fail --retry 5 --retry-delay 2 http://localhost:5000/health || exit 1
          echo "Health check passed"
          docker stop vaultguard-test
          docker rm vaultguard-test